<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Convite</title>
    <link rel="stylesheet" href="/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Leckerli+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <main>
            <div class="main-container">
                <img src="/assets/Logo.svg" alt="">
                <h1>Festivite</h1>
                <h3>Crie um convite digital para o seu evento</h3>
            </div>
        </main>

        <aside>
            <div class="aside-container">
                <h2>Crie seu convite</h2>

                <form>
                    <fieldset class="child-infor">

                        <legend class="name-icones">
                            <img class="imgIcons" src="/assets/icons/calendar.svg" alt="calendar">
                            <h4>Sobre o evento</h4>
                        </legend>

                        <div class="input-wrapper">
                            <label for="fullName">Título</label>
                            <input id="fullName" type="text" placeholder="Nome do evento">
                        </div>

                        <div class="flex">

                            <div class="input-wrapper">
                                <label for="birth">Início</label>
                                <input type="date" id="birth" lang="pt-BR">
                            </div>

                            <div class="input-wrapper">
                                <label for="button">Fim</label>
                                <input type="date" id="button" lang="pt-BR">
                            </div>

                        </div>
                        <div class="flex">

                            <div class="input-wrapper">
                                <label for="end">Tipo</label>
                                <input type="text" id="end" lang="pt-BR">
                            </div>

                            <div class="input-wrapper">
                                <label for="location">Local</label>
                                <input type="text" id="location" lang="pt-BR" placeholder="Link ou endereço">
                            </div>

                        </div>

                        <div class="textarea-wrapper">
                            <label for="description">Descrição</label>
                            <textarea name="description" id="description"
                                placeholder="Escreva sobre os detalhes do evento" rows="10"></textarea>
                        </div>

                    </fieldset>
                </form>
            </div>
        </aside>
    </div>
</body>

</html>
